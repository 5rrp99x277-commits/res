name: Build RP2040 CYW4373 Emulator UF2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-uf2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential python3 git

      - name: Fetch Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git "$GITHUB_WORKSPACE/pico-sdk"
          cd "$GITHUB_WORKSPACE/pico-sdk"
          git submodule update --init --recursive

      - name: Configure CMake
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          cmake -S . -B build -G Ninja -DPICO_BOARD=pico

      - name: Build
        run: |
          cmake --build build --verbose

      - name: List build outputs
        run: |
          find build -maxdepth 3 -type f \( -name "*.uf2" -o -name "*.elf" -o -name "*.bin" -o -name "*.hex" \) -print

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyw4373_emulator_nohub_checked_v4_16_explicit_connect_uf2
          path: |
            build/*.uf2
            build/**/*.uf2
          if-no-files-found: error
